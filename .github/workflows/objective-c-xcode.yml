name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyse default scheme using xcodebuild command
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          xcode26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$xcode26" ]; then
            echo "No Xcode 26 found, available versions:"; ls /Applications/Xcode*.app -d; exit 1
          fi
          echo "Using $xcode26"
          sudo xcode-select -s "$xcode26"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild clean build analyze \
            -scheme CalorieCounter \
            -project CalorieCounter.xcodeproj \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
